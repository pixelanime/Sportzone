name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]   # atau gh-pages, tergantung pilihan Anda

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # (Opsional) Install Node & build tools jika Anda pakai bundler
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'

      # - name: Install dependencies
      #   run: npm ci

      # - name: Build (if using a bundler)
      #   run: npm run build

      # Deploy ke GitHub Pages (menggunakan gh‑pages branch)
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./   # folder yang berisi index.html, assets, dll.
          # Jika Anda memakai folder /docs, ubah menjadi ./docs
