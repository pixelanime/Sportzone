name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]   # atau gh-pages, tergantung pilihan Anda

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # (Opsional) Install Node & build tools jika Anda pakai bundler
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'

      # - name: Install dependencies
      #   run: npm ci

      # - name: Build (if using a bundler)
      #   run: npm run build

      # Deploy ke GitHub Pages (menggunakan gh‑pages branch)
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./   # folder yang berisi index.html, assets, dll.
          # Jika Anda memakai folder /docs, ubah menjadi ./docs

        name: Update Live Scores

on:
  schedule:
    - cron: '0 * * * *'   # tiap jam tepat
  workflow_dispatch:      # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # needed for commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Run fetch script
        env:
          SPORTS_DB_KEY: ${{ secrets.SPORTS_DB_KEY }}
        run: python scripts/fetch_scores.py

      - name: Commit & push JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add scripts/scores.json
          git commit -m "Update live scores $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push origin main
